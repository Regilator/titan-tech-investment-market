<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titan Admin | Lod of Tech</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding: 20px; font-family: 'Orbitron', sans-serif; background: #0a0a0a; color: white; }
        .admin-box { 
            background: #151515; border: 2px solid #A020F0; 
            padding: 20px; border-radius: 15px; max-width: 500px; margin: auto;
            display: none; /* Hidden until PIN is correct */
        }
        .login-box {
            background: #151515; border: 2px solid #ff0000; 
            padding: 30px; border-radius: 15px; text-align: center;
            max-width: 400px; margin: 100px auto;
        }
        input, select { 
            width: 100%; padding: 12px; margin: 10px 0; 
            background: #000; color: #00f2ff; border: 1px solid #333; 
            border-radius: 5px; box-sizing: border-box;
        }
        button { 
            width: 100%; padding: 15px; background: #A020F0; 
            color: white; border: none; font-weight: bold; 
            cursor: pointer; border-radius: 5px; margin-top: 10px;
        }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div id="login-screen" class="login-box">
        <h2 style="color: #ff0000;">TITAN SECURE ACCESS</h2>
        <p style="font-size: 12px;">ENTER ADMIN PIN TO MANAGE STOCK</p>
        <input type="password" id="pinInput" placeholder="Enter PIN">
        <button onclick="checkPin()">ACCESS SYSTEM 🔑</button>
    </div>

    <div id="admin-interface" class="admin-box">
        <h2 style="color: #A020F0; text-align: center;">TITAN STOCK MANAGER</h2>
        <hr border="1" color="#333">
        
        <label>Product Name:</label>
        <input type="text" id="itemName" placeholder="e.g. Mortal Kombat XL">
        
        <label>Price:</label>
        <input type="text" id="itemPrice" placeholder="e.g. $10">
        
        <label>Image Path:</label>
        <input type="text" id="itemImg" placeholder="assets/games/mkxl.png">
        
        <label>Category:</label>
        <select id="itemCat">
            <option value="REPAIRS">🔧 REPAIRS</option>
            <option value="MOVIES">🎬 MOVIES</option>
            <option value="TV_SHOWS">📺 TV SHOWS</option>
            <option value="GAMES">🎮 GAMES</option>
            <option value="SOFTWARE">💻 SOFT</option>
            <option value="MUSIC">🎵 MUSIC</option>
            <option value="HACK">💀 HACK</option>
        </select>

        <button onclick="uploadToTitan()">UPLOAD TO CATALOG ⚡</button>
        <p id="status" style="text-align:center; margin-top:15px; font-weight: bold;"></p>
        <button onclick="location.reload()" style="background:#333; font-size: 10px;">LOGOUT</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBRHHvX9TMDsJQ8PzD7FMsq00VMUVnx_UI",
            databaseURL: "https://titan-tech-hub-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function checkPin() {
            const enteredPin = document.getElementById('pinInput').value;
            const correctPin = "Reggiex123x123";

            if (enteredPin === correctPin) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-interface').style.display = 'block';
            } else {
                alert("ACCESS DENIED: Incorrect PIN");
            }
        }

        function uploadToTitan() {
            const name = document.getElementById('itemName').value;
            const price = document.getElementById('itemPrice').value;
            const img = document.getElementById('itemImg').value;
            const cat = document.getElementById('itemCat').value;
            const status = document.getElementById('status');

            if(!name || !price) {
                status.innerText = "⚠️ Missing info!";
                status.style.color = "orange";
                return;
            }

            // Push creates a new entry with a unique ID
            const newPostRef = db.ref('catalog').push();
            newPostRef.set({
                name: name,
                price: price,
                img: img,
                cat: cat
            }).then(() => {
                status.innerText = "✅ SYSTEM UPDATED!";
                status.style.color = "#00ff00";
                // Clear inputs for next item
                document.getElementById('itemName').value = "";
                document.getElementById('itemPrice').value = "";
            }).catch((error) => {
                status.innerText = "❌ ERROR: " + error.message;
                status.style.color = "red";
            });
        }
    </script>
</body>
</html>
