<!DOCTYPE html>
<html>
<head>
    <title>OMEGA | COMMAND</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #111; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; background: #000; color: #00ff41; border: 1px solid #444; }
        button { width: 100%; padding: 15px; background: #B01E23; color: white; border: none; font-weight: bold; cursor: pointer; }
        .item-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>
    <div class="card">
        <h3>DEPLOY NEW ITEM</h3>
        <input type="text" id="itemName" placeholder="Name">
        <input type="text" id="itemPrice" placeholder="Price">
        <select id="itemCat"><option value="REPAIRS">REPAIRS</option><option value="HACK">HACK</option><option value="SOFTWARE">SOFTWARE</option></select>
        <button onclick="deploy()">PUSH TO HUB</button>
    </div>
    <div class="card">
        <h3>INVENTORY (TOTAL REV: <span id="rev">$0</span>)</h3>
        <div id="inventory-list"></div>
    </div>
    <script>
        const config = { apiKey: "AIzaSyBRHHvX9TMDsJQ8PzD7FMsq00VMUVnx_UI", databaseURL: "https://titan-tech-hub-default-rtdb.firebaseio.com" };
        firebase.initializeApp(config); const db = firebase.database();
        function deploy() {
            const name = document.getElementById('itemName').value;
            const price = document.getElementById('itemPrice').value;
            const cat = document.getElementById('itemCat').value;
            db.ref('catalog').push({ name, price, cat });
        }
        db.ref('catalog').on('value', snap => {
            const list = document.getElementById('inventory-list'); list.innerHTML = "";
            snap.forEach(item => {
                list.innerHTML += `<div class="item-row">${item.val().name} - ${item.val().price} <button onclick="db.ref('catalog').child('${item.key}').remove()">DEL</button></div>`;
            });
        });
    </script>
</body>
</html>
