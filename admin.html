<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titan Admin | Lod of Tech</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding: 20px; font-family: 'Roboto Mono', monospace; }
        .admin-box { background: #151515; border: 2px solid #A020F0; padding: 20px; border-radius: 15px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; background: #000; color: #00f2ff; border: 1px solid #333; }
        button { width: 100%; padding: 15px; background: #A020F0; color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h2 style="color: #A020F0;">TITAN STOCK MANAGER</h2>
        <p style="font-size: 10px; color: #888;">Adding to: titan-tech-hub-default-rtdb</p>
        
        <input type="text" id="itemName" placeholder="Item Name (e.g. FIFA 2026)">
        <input type="text" id="itemPrice" placeholder="Price (e.g. $10)">
        <input type="text" id="itemImg" placeholder="Image Path (e.g. assets/movies/pic.png)">
        
        <select id="itemCat">
            <option value="REPAIRS">🔧 REPAIRS</option>
            <option value="MOVIES">🎬 MOVIES</option>
            <option value="TV_SHOWS">📺 TV SHOWS</option>
            <option value="GAMES">🎮 GAMES</option>
            <option value="SOFTWARE">💻 SOFT</option>
            <option value="MUSIC">🎵 MUSIC</option>
            <option value="HACK">💀 HACK</option>
        </select>

        <button onclick="uploadToTitan()">UPLOAD TO CATALOG ⚡</button>
        <p id="status" style="text-align:center; margin-top:10px;"></p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBRHHvX9TMDsJQ8PzD7FMsq00VMUVnx_UI",
            databaseURL: "https://titan-tech-hub-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function uploadToTitan() {
            const name = document.getElementById('itemName').value;
            const price = document.getElementById('itemPrice').value;
            const img = document.getElementById('itemImg').value;
            const cat = document.getElementById('itemCat').value;
            const status = document.getElementById('status');

            if(!name || !price) {
                alert("Please add Name and Price!");
                return;
            }

            // Generates a unique ID automatically
            const newPostRef = db.ref('catalog').push();
            newPostRef.set({
                name: name,
                price: price,
                img: img,
                cat: cat
            }).then(() => {
                status.innerText = "✅ UPLOADED TO TITAN HUB!";
                status.style.color = "#00ff00";
                document.getElementById('itemName').value = "";
            }).catch((error) => {
                status.innerText = "❌ ERROR: " + error.message;
                status.style.color = "red";
            });
        }
    </script>
</body>
</html>
