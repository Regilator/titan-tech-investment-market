<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#B01E23">
    <title>TITAN TECH HUB | Ω Edition</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div id="splash">
        <div class="titan-logo-css logo-large"></div>
        <div id="boot-text" class="terminal-text">> SECURE_BOOT_ACTIVE</div>
        <div id="countdown" style="color: #B01E23; font-family: 'Roboto Mono'; font-size: 14px; margin-top: 10px;">LAUNCHING: 00d 00h 00m</div>
        <div class="loader-bar"><div class="progress"></div></div>
    </div>

    <header>
        <div class="header-top">
            <div class="titan-logo-css logo-small"></div>
            <h1>TITAN TECH HUB</h1>
            <div id="live-clock">00:00:00</div>
        </div>
        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('ALL')">ALL</button>
            <button class="tab-btn" onclick="switchTab('REPAIRS')">🔧 REPAIRS</button>
            <button class="tab-btn" onclick="switchTab('SOFTWARE')">💻 SOFT</button>
            <button class="tab-btn" onclick="switchTab('HACK')">💀 HACK</button>
            <button class="tab-btn" onclick="switchTab('GAMES')">🎮 GAMES</button>
        </div>
    </header>

    <main>
        <div class="tracker-card card">
            <h3 style="font-size: 10px; color: #888; margin-bottom: 10px;">> TRACK_DEVICE_REPAIR</h3>
            <div style="display:flex; gap:10px;">
                <input type="text" id="job-id-input" placeholder="Enter Job ID (TITAN-XXX)">
                <button onclick="checkRepair()" class="tab-btn active" style="width: auto;">TRACK</button>
            </div>
            <p id="repair-status-result" style="display:none; font-family:'Roboto Mono'; font-size:12px; margin-top:10px;">
                STATUS: <span id="status-text">--</span>
            </p>
        </div>

        <div class="search-wrap">
            <input type="text" id="main-search" placeholder="Search system nodes..." oninput="searchCatalog()">
        </div>
        
        <div id="catalog-grid" class="grid-layout"></div>
    </main>

    <div id="cart-bar" class="cart-hidden">
        <div id="qr-code-area"></div>
        <div class="order-actions">
            <button onclick="order('ADMIN')" class="wa-btn">SALES (+3665)</button>
            <button onclick="order('TECH')" class="wa-btn tech-btn">TECH (+7711)</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
