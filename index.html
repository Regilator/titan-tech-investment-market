<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN TECH | OMEGA HUB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="splash">
        <div class="splash-content">
            <h1 class="neon-text">TITAN OMEGA</h1>
            <div class="loader-bar"><div class="progress"></div></div>
            <p style="font-size:10px; letter-spacing:2px;">INITIALIZING OMEGA SALES...</p>
        </div>
    </div>

    <div class="news-ticker">
        <div class="ticker-content">
            MOBILE DELIVERY AVAILABLE... 10 MOVIES FOR $1... 2 SEASONS FOR $1... GAMES BY SIZE... REPAIRS AT 14 28 CRESCENT...
        </div>
    </div>

    <header>
        <h1 class="neon-text">TITAN TECH</h1>
        <div class="status-container">
            <span id="status-light" class="offline"></span>
            <span id="status-text">OFFLINE</span>
        </div>
        <button onclick="openMap()" class="map-btn">📍 FIND SHOP</button>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" onclick="switchTab('ALL')">ALL</button>
        <button class="tab-btn" onclick="switchTab('REPAIRS')">REPAIRS</button>
        <button class="tab-btn" onclick="switchTab('MOVIES')">MOVIES</button>
        <button class="tab-btn" onclick="switchTab('GAMES')">GAMES</button>
        <button class="tab-btn" onclick="switchTab('SOFTWARE')">SOFTWARE</button>
    </nav>

    <main>
        <div class="action-bar">
            <input type="text" id="catalog-search" placeholder="Search Titan database...">
            <button onclick="sendGeneralRequest()" class="request-btn">REQUEST</button>
        </div>
        <div id="catalog-grid" class="grid"></div>
    </main>

    <div id="cart-bar" class="cart-hidden">
        <div class="cart-left">
            <span id="cart-count">0 Items</span><br>
            <span id="cart-total">$0.00</span>
        </div>
        <div class="cart-center">
            <label class="mobile-toggle">
                <input type="checkbox" id="mobile-service-check" onchange="updateCartUI()">
                <span class="slider"></span>
            </label>
            <span style="font-size: 8px; color: var(--purple); display: block; margin-top:2px;">MOBILE</span>
        </div>
        <div class="cart-right">
            <button onclick="clearCart()" class="clear-btn">CLR</button>
            <button onclick="checkout()" class="checkout-btn">ORDER ⚡</button>
        </div>
    </div>

    <footer>
        <img id="digital-qr" src="">
        <p>14 28 Crescent, Warren Park 1, Harare</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
