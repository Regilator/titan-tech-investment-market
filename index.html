<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Titan Tech Hub | Lod of Tech</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono&display=swap" rel="stylesheet">
</head>
<body>

    <div id="splash">
        <div class="titan-logo-css"></div>
        <h1 class="glitch" data-text="TITAN TECH">TITAN TECH</h1>
        <div class="loader"></div>
    </div>

    <header>
        <div class="header-content">
            <div class="titan-logo-css logo-small"></div>
            <div class="header-text">
                <h2>TITAN TECH HUB</h2>
                <div class="admin-contacts">
                    <a href="https://wa.me/263715913665" class="contact-pill whatsapp">💬 071 591 3665</a>
                    <a href="tel:0788633491" class="contact-pill calls">📞 078 863 3491</a>
                </div>
            </div>
        </div>
        <div class="ticker-wrap">
            <div class="ticker">
                GRAND OPENING: <span id="countdown-clock">--d --h --m --s</span> | 10 MOVIES $1 | REPAIRS (IPHONE/SAMSUNG) | REVEAL VOUCHERS ONLINE...
            </div>
        </div>
    </header>

    <main>
        <div class="search-container">
            <input type="text" id="catalog-search" placeholder="Search (e.g. Mortal Kombat, iCloud, Windows)...">
        </div>

        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('ALL')">ALL</button>
            <button class="tab-btn" onclick="switchTab('REPAIRS')">🔧 REPAIRS</button>
            <button class="tab-btn" onclick="switchTab('MOVIES')">🎬 MOVIES</button>
            <button class="tab-btn" onclick="switchTab('TV_SHOWS')">📺 TV SHOWS</button>
            <button class="tab-btn" onclick="switchTab('GAMES')">🎮 GAMES</button>
            <button class="tab-btn" onclick="switchTab('SOFTWARE')">💻 SOFT</button>
            <button class="tab-btn" onclick="switchTab('MUSIC')">🎵 MUSIC</button>
            <button class="tab-btn" onclick="switchTab('HACK')">💀 HACK</button>
            <button class="tab-btn vouchers" onclick="switchTab('VOUCHERS')">🎫 VOUCHERS</button>
        </div>

        <div id="catalog-grid" class="grid-layout"></div>

        <div id="voucher-zone" style="display:none; padding: 20px;">
            <div class="voucher-portal-box">
                <h3 class="voucher-title">TITAN REVEAL PORTAL</h3>
                <input type="text" id="secret-code-input" placeholder="ENTER CODE HERE..." style="text-align:center; text-transform:uppercase;">
                <button onclick="revealVoucher()" style="background: #00f2ff; color: black; font-weight:bold; width:100%; padding:15px; margin-top:10px; border-radius:5px;">REVEAL PIN 🔓</button>

                <div id="reveal-display" style="margin-top: 25px; display: none;">
                    <div style="border: 2px dashed #00f2ff; padding: 15px; background: #000;">
                        <p style="font-size: 10px; color: #888;">YOUR PIN:</p>
                        <h2 id="voucher-pin-out" style="color: #00ff00; letter-spacing: 3px;">--------</h2>
                    </div>
                </div>
                
                <div class="qr-box" style="margin-top:30px; background:white; padding:10px; border-radius:10px; display:inline-block;">
                    <img id="titan-digital-qr" src="" alt="Titan QR" style="width:150px; display:block;">
                </div>
            </div>
        </div>
    </main>

    <div id="cart-bar" class="cart-hidden">
        <div class="cart-content">
            <span id="cart-total">$0.00</span>
            <button id="checkout-btn" onclick="checkout()">ORDER VIA WHATSAPP ⚡</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
