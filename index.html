<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN TECH INVESTMENT | OMEGA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="splash">
        <div class="splash-content">
            <h1 class="neon-text">TITAN OMEGA</h1>
            <div class="loader-bar"><div class="progress"></div></div>
            <p style="font-size:10px; letter-spacing:2px;">INITIALIZING SYSTEMS...</p>
        </div>
    </div>

    <div class="news-ticker">
        <div class="ticker-content">
            SYSTEMS ONLINE... NEW ARRIVALS: THE FLASH (2023), MORTAL KOMBAT XL, WINDOWS 11 PRO... CONTACT TECH FOR SOFTWARE REQUESTS... FASTEST REPAIRS IN WARREN PARK...
        </div>
    </div>

    <header>
        <h1 class="neon-text">TITAN TECH</h1>
        <div class="status-container">
            <span id="status-light" class="offline"></span>
            <span id="status-text">SYSTEM OFFLINE</span>
        </div>
        <div id="timer" class="countdown">00d 00h 00m 00s</div>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" onclick="switchTab('ALL')">ALL</button>
        <button class="tab-btn" onclick="switchTab('REPAIRS')">REPAIRS</button>
        <button class="tab-btn" onclick="switchTab('MOVIES')">MOVIES</button>
        <button class="tab-btn" onclick="switchTab('GAMES')">GAMES</button>
        <button class="tab-btn" onclick="switchTab('SOFTWARE')">SOFTWARE</button>
    </nav>

    <main>
        <div class="action-bar">
            <input type="text" id="catalog-search" placeholder="Search the Omega database...">
            <button onclick="sendGeneralRequest()" class="request-btn">SEND REQUEST</button>
        </div>

        <div id="catalog-grid" class="grid">
            </div>
    </main>

    <section class="reviews-section">
        <h3 class="neon-text-small">CUSTOMER FEEDBACK</h3>
        <div class="reviews-container" id="reviews-list"></div>
        <div style="text-align:center; margin-top:15px;">
            <button onclick="requestReview()" class="review-btn">STRIKE A REVIEW ⚡</button>
        </div>
    </section>

    <footer>
        <img id="digital-qr" src="" alt="Scan Me">
        <p>14 28 Crescent, Warren Park 1, Harare</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
