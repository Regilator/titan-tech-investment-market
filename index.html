<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN TECH | OMEGA HUB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="splash">
        <div class="splash-content">
            <h1 class="neon-text">TITAN OMEGA</h1>
            <div class="loader-bar"><div class="progress"></div></div>
            <p style="font-size:10px; letter-spacing:2px;">SYNCING TITAN SYSTEMS...</p>
        </div>
    </div>

    <div class="news-ticker">
        <div class="ticker-content">
            DEALS: 10 MOVIES FOR $1 | 2 SEASONS FOR $1 | GAMES BY SIZE | REPAIRS AT 14 28 CRESCENT... MOBILE DELIVERY AVAILABLE!
        </div>
    </div>

    <header>
        <h1 class="neon-text">TITAN TECH</h1>
        
        <div class="contact-header">
            <div class="contact-line" onclick="window.open('tel:+263715913665')">
                <span class="icon">📞</span> ADMIN: 071 591 3665
            </div>
            <div class="contact-line" onclick="window.open('tel:+263781847711')">
                <span class="icon">🛠️</span> TECH: 078 184 7711
            </div>
        </div>

        <div class="status-container">
            <span id="status-light" class="offline"></span>
            <span id="status-text">OFFLINE</span>
        </div>
        <button onclick="openMap()" class="map-btn">📍 14 28 CRESCENT, WARREN PARK 1</button>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" onclick="switchTab('ALL')">ALL</button>
        <button class="tab-btn" onclick="switchTab('REPAIRS')">REPAIRS</button>
        <button class="tab-btn" onclick="switchTab('MOVIES')">MOVIES</button>
        <button class="tab-btn" onclick="switchTab('SERIES')">SERIES</button>
        <button class="tab-btn" onclick="switchTab('GAMES')">GAMES</button>
        <button class="tab-btn" onclick="switchTab('SOFTWARE')">SOFTWARE</button>
        <button class="tab-btn" onclick="switchTab('HACK')">HACK</button>
        <button class="tab-btn" onclick="switchTab('MUSIC')">MUSIC</button>
    </nav>

    <main>
        <div class="action-bar">
            <input type="text" id="catalog-search" placeholder="Search the database...">
            <button onclick="sendGeneralRequest()" class="request-btn">REQUEST</button>
        </div>
        <div id="catalog-grid" class="grid"></div>
    </main>

    <div id="cart-bar" class="cart-hidden">
        <div class="cart-left">
            <span id="cart-count">0 Items</span><br>
            <span id="cart-total">$0.00</span>
        </div>
        <div class="cart-center">
            <label class="mobile-toggle">
                <input type="checkbox" id="mobile-service-check" onchange="updateCartUI()">
                <span class="slider"></span>
            </label>
            <span style="font-size: 8px; color: var(--purple); display: block; margin-top:2px;">MOBILE</span>
        </div>
        <div class="cart-right">
            <button onclick="clearCart()" class="clear-btn">CLR</button>
            <button onclick="checkout()" class="checkout-btn">ORDER ⚡</button>
        </div>
    </div>

    <footer>
        <img id="digital-qr" src="">
        <p>Titan Tech Investment Market | Harare</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
