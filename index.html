<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN TECH | OFFICIAL RECEIPT</title>
    <style>
        :root { --purple: #A020F0; --black: #000; }
        body { background: var(--black); color: #fff; font-family: 'Courier New', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .receipt-card { 
            border: 2px solid var(--purple); 
            padding: 30px; 
            width: 100%; 
            max-width: 350px; 
            background: #0a0a0a; 
            box-shadow: 0 0 20px rgba(160, 32, 240, 0.3);
            position: relative;
        }

        .logo { color: var(--purple); font-size: 28px; font-weight: bold; text-align: center; margin-bottom: 5px; letter-spacing: 3px; }
        .sub-logo { font-size: 10px; text-align: center; color: #666; margin-bottom: 20px; border-bottom: 1px dashed #333; padding-bottom: 10px; }

        .info-section { font-size: 11px; line-height: 1.6; margin-bottom: 20px; color: #bbb; }
        .item-row { display: flex; justify-content: space-between; margin: 12px 0; font-size: 13px; border-bottom: 1px solid #111; padding-bottom: 5px; }
        
        .total-box { 
            border-top: 2px solid var(--purple); 
            margin-top: 25px; 
            padding-top: 15px; 
            display: flex; 
            justify-content: space-between; 
            font-weight: bold; 
            font-size: 20px; 
            color: #00ff00; 
        }

        .footer { font-size: 9px; color: #444; text-align: center; margin-top: 40px; text-transform: uppercase; letter-spacing: 1px; }
        
        .no-print { 
            background: var(--purple); 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            margin-top: 20px; 
            cursor: pointer; 
            font-weight: bold; 
            border-radius: 4px;
            width: 100%;
            max-width: 350px;
        }

        @media print { .no-print { display: none; } body { background: white; color: black; } .receipt-card { border: 2px solid black; box-shadow: none; } }
    </style>
</head>
<body>

    <div class="receipt-card" id="receipt">
        <div class="logo">TITAN TECH</div>
        <div class="sub-logo">INVESTMENT MARKET MARKET • HARARE</div>

        <div class="info-section">
            STATION: 14 28 CRESCENT, WP1<br>
            DATE: <span id="date"></span><br>
            TRANS-ID: #<span id="trans-id"></span><br>
            STATUS: <span style="color:#00ff00">PAID / VERIFIED</span>
        </div>

        <div id="items-container">
            </div>

        <div class="total-box">
            <span>TOTAL:</span>
            <span id="total-price">$0.00</span>
        </div>

        <div class="footer">
            *** THANK YOU FOR YOUR BUSINESS ***<br>
            NO REFUNDS ON ACTIVATED SOFTWARE<br>
            TITAN OMEGA SYSTEMS v3.0
        </div>
    </div>

    <button class="no-print" onclick="window.print()">SAVE AS PDF / SEND TO WHATSAPP</button>

    <script>
        // Data Extraction
        const params = new URLSearchParams(window.location.search);
        const rawItems = params.get('items');
        const total = params.get('total') || "0.00";

        document.getElementById('date').innerText = new Date().toLocaleString();
        document.getElementById('trans-id').innerText = Math.random().toString(36).substr(2, 9).toUpperCase();
        document.getElementById('total-price').innerText = `$${total}`;

        if (rawItems) {
            const items = JSON.parse(decodeURIComponent(rawItems));
            const container = document.getElementById('items-container');
            items.forEach(item => {
                if(item.name.trim() !== "") {
                    container.innerHTML += `
                        <div class="item-row">
                            <span>${item.name}</span>
                            <span>ITEM</span>
                        </div>`;
                }
            });
        }
    </script>
</body>
</html>
