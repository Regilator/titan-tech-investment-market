<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Titan Tech Hub | Lod of Tech</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono&display=swap" rel="stylesheet">
</head>
<body>

    <div id="splash">
        <div class="titan-logo-css"></div>
        <h1 class="glitch" data-text="TITAN TECH">TITAN TECH</h1>
        <div class="loader"></div>
    </div>

    <header>
        <div class="header-content">
            <div class="titan-logo-css" style="transform: scale(0.4);"></div>
            <div class="header-text">
                <h2>TITAN TECH HUB</h2>
                <div class="admin-contacts">
                    <a href="https://wa.me/263715913665" class="contact-pill whatsapp">💬 071 591 3665</a>
                    <a href="tel:0788633491" class="contact-pill calls">📞 078 863 3491</a>
                </div>
            </div>
        </div>
        <div class="ticker-wrap">
            <div class="ticker">
                GRAND OPENING: <span id="countdown-clock">--d --h --m --s</span> | 10 MOVIES $1 | REPAIRS (IPHONE/SAMSUNG) | WINDOWS & HACK TOOLS...
            </div>
        </div>
    </header>

    <main>
        <div class="search-container">
            <input type="text" id="catalog-search" placeholder="Search (e.g. Mortal Kombat, iCloud, Windows)...">
        </div>

        <div class="tabs-container">
            <button class="tab-btn active" onclick="switchTab('ALL')">ALL</button>
            <button class="tab-btn" onclick="switchTab('REPAIRS')">🔧 REPAIRS</button>
            <button class="tab-btn" onclick="switchTab('MOVIES')">🎬 MOVIES</button>
            <button class="tab-btn" onclick="switchTab('TV_SHOWS')">📺 TV SHOWS</button>
            <button class="tab-btn" onclick="switchTab('GAMES')">🎮 GAMES</button>
            <button class="tab-btn" onclick="switchTab('SOFTWARE')">💻 SOFT</button>
            <button class="tab-btn" onclick="switchTab('MUSIC')">🎵 MUSIC</button>
            <button class="tab-btn" onclick="switchTab('HACK')">💀 HACK</button>
            <button class="tab-btn vouchers" onclick="switchTab('VOUCHERS')">🎫 VOUCHERS</button>
        </div>

        <div id="catalog-grid" class="grid-layout">
            </div>

        <div id="voucher-zone" class="voucher-hidden">
            <div class="voucher-portal-box">
                <h3 class="voucher-title">TITAN DIGITAL PORTAL</h3>
                <p class="voucher-subtitle">Scan to access the main hub</p>
                
                <div class="qr-container">
                    <img id="titan-digital-qr" src="" alt="Titan QR Code">
                </div>
                
                <p style="font-size: 10px; color: #888; font-family: 'Roboto Mono'; margin-top: 15px;">lodoftech.github.io/titan-tech-hub</p>
            </div>
        </div>

    </main>

    <div id="cart-bar" class="cart-hidden">
        <div class="cart-content">
            <span id="cart-total">$0.00</span>
            <button id="checkout-btn" onclick="checkout()">ORDER VIA WHATSAPP ⚡</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
