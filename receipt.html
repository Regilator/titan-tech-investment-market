<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Courier New', monospace; width: 300px; padding: 20px; border: 1px solid #ddd; }
        .logo { background: #B01E23; color: white; padding: 10px; text-align: center; font-size: 24px; }
        .details { margin: 20px 0; border-top: 1px dashed #000; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="logo">TITAN Ω</div>
    <div class="details">
        JOB_ID: <span id="rid"></span><br>
        DATE: <span id="date"></span><br>
        SERVICE: <span id="svc"></span><br>
        PRICE: <span id="prc"></span>
    </div>
    <p style="font-size: 10px; text-align: center;">WWW.TITAN-TECH.ZW</p>
    <script>
        const params = new URLSearchParams(window.location.search);
        document.getElementById('rid').innerText = params.get('id');
        document.getElementById('date').innerText = new Date().toLocaleDateString();
        document.getElementById('svc').innerText = params.get('svc');
        document.getElementById('prc').innerText = params.get('prc');
    </script>
</body>
</html>
